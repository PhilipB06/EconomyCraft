import org.gradle.api.GradleException

plugins {
    id "com.gradleup.shadow"
}

architectury {
    platformSetupLoomIde()
    fabric()
}

configurations {
    common { canBeResolved = true; canBeConsumed = false }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentFabric.extendsFrom common
    shadowBundle { canBeResolved = true; canBeConsumed = false }
}

repositories {
    gradlePluginPortal()
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://maven.architectury.dev/" }
    maven { url "https://maven.nucleoid.xyz/"; name "Nucleoid" }
    mavenCentral()
}

def mcCoord = (rootProject.findProperty("minecraft_version") ?: rootProject.minecraft_version) as String
def tgt     = rootProject.ext.resolveMcTarget(mcCoord)

// The placeholder-api library did a major API redesign between the 1.21.11-era release
// (Placeholders.register) and the 26.x-era release (Placeholders.registerServer); only the
// placeholder integration entrypoint lives here, forked per era.
sourceSets {
    main {
        java {
            srcDir "src/${tgt.obfuscated ? 'obfuscated' : 'unobfuscated'}/java"
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${mcCoord}"

    if (tgt.obfuscated) {
        // 1.21.11 is obfuscated; Loom needs real mappings to remap it. Official Mojang mappings
        // (rather than Yarn) so fabric-specific source matches common's own naming.
        mappings loom.officialMojangMappings()

        // Platform loader + API
        modImplementation "net.fabricmc:fabric-loader:${rootProject.fabric_loader_version}"
        modImplementation "net.fabricmc.fabric-api:fabric-api:${rootProject.findProperty('fabric_api_version') ?: tgt.fabricApi}"
        modApi "dev.architectury:architectury-fabric:${rootProject.findProperty('architectury_version_plain') ?: tgt.architecturyVer}"

        // Link common module — namedElements is the remap-aware configuration Loom needs to
        // remap common's official-mappings output into this project's own mapped classpath.
        common(project(path: ":common", configuration: "namedElements")) { transitive = false }
        shadowBundle project(path: ":common", configuration: "transformProductionFabric")

        modCompileOnly "eu.pb4:placeholder-api:${rootProject.findProperty('text_placeholder_api_version') ?: tgt.textPlaceholderApi}"
    } else {
        // Platform loader + API
        implementation "net.fabricmc:fabric-loader:${rootProject.fabric_loader_version}"
        implementation "net.fabricmc.fabric-api:fabric-api:${rootProject.findProperty('fabric_api_version') ?: tgt.fabricApi}"
        api "dev.architectury:architectury-fabric:${rootProject.findProperty('architectury_version_plain') ?: tgt.architecturyVer}"

        // Link common module
        common(project(path: ":common")) { transitive = false }
        shadowBundle project(path: ":common", configuration: "transformProductionFabric")

        compileOnly "eu.pb4:placeholder-api:${rootProject.findProperty('text_placeholder_api_version') ?: tgt.textPlaceholderApi}"
    }
}

processResources {
    def mcFull = mcCoord.toString()
    def parts = mcFull.tokenize('.')
    if (parts.size() < 2) throw new GradleException("Invalid minecraft_version: ${mcFull}")
    def major = parts[0] as int
    def minor = parts[1] as int
    def mcLo = "${major}.${minor}"
    def mcHi = "${major}.${minor + 1}"

    inputs.property("version", project.version)
    inputs.property("mcLo", mcLo)
    inputs.property("mcHi", mcHi)
    inputs.property("archVer", tgt.architecturyVer)

    filesMatching("fabric.mod.json") {
        expand version: project.version, mcLo: mcLo, mcHi: mcHi, archVer: tgt.architecturyVer
    }
}

if (tgt.obfuscated) {
    shadowJar {
        configurations = [project.configurations.shadowBundle]
        archiveClassifier = "dev-shadow"
    }

    remapJar {
        inputFile.set(shadowJar.archiveFile)
        archiveVersion = ""
    }
} else {
    jar {
        archiveClassifier = "raw"
    }

    shadowJar {
        dependsOn jar
        mainSpec.sourcePaths.clear()
        from(zipTree(jar.archiveFile))

        configurations = [project.configurations.shadowBundle]
        archiveClassifier = null
    }
}
