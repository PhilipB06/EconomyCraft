name: Release to Modrinth & CurseForge

on:
  workflow_dispatch:
    inputs:
      release_1_21_11:
        description: "Release 1.21.11"
        required: false
        type: boolean
        default: false
      release_26_1_x:
        description: "Release 26.1.x"
        required: false
        type: boolean
        default: false
      release_26_2:
        description: "Release 26.2"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run - build only, skip publishing to Modrinth/CurseForge"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  setup:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      mc_games: ${{ steps.set.outputs.mc_games }}
      release_matrix: ${{ steps.set.outputs.release_matrix }}
      mod_version: ${{ steps.version.outputs.mod_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Show version info
        id: version
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION=$(grep -E '^mod_version' gradle.properties | sed -E 's/^mod_version\s*=\s*//' | tr -d '[:space:]')
          TAG_VERSION=$(git tag --points-at HEAD | head -n1)
          TAG_VERSION="${TAG_VERSION:-(none)}"
          {
            echo "### Version check"
            echo ""
            echo "| Source | Version |"
            echo "|---|---|"
            echo "| \`gradle.properties\` (\`mod_version\`) | \`$GRADLE_VERSION\` |"
            echo "| Git tag on this commit | \`$TAG_VERSION\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "mod_version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve selected Minecraft versions
        id: set
        shell: bash
        run: |
          set -euo pipefail
          games="[]"
          release_matrix="[]"

          if [ "${{ inputs.release_1_21_11 }}" = "true" ]; then
            games=$(jq -c '. + ["1.21.11"]' <<< "$games")
            release_matrix=$(jq -c '. + [{"mc_game":"1.21.11","game_versions":"1.21.11"}]' <<< "$release_matrix")
          fi
          if [ "${{ inputs.release_26_1_x }}" = "true" ]; then
            games=$(jq -c '. + ["26.1.2"]' <<< "$games")
            release_matrix=$(jq -c '. + [{"mc_game":"26.1.2","game_versions":"[26.1,26.2)"}]' <<< "$release_matrix")
          fi
          if [ "${{ inputs.release_26_2 }}" = "true" ]; then
            games=$(jq -c '. + ["26.2"]' <<< "$games")
            release_matrix=$(jq -c '. + [{"mc_game":"26.2","game_versions":"[26.2,26.3)"}]' <<< "$release_matrix")
          fi

          if [ "$games" = "[]" ]; then
            echo "::error::Select at least one Minecraft version to release (1.21.11 / 26.1.x / 26.2)."
            exit 1
          fi

          echo "mc_games=$games" >> "$GITHUB_OUTPUT"
          echo "release_matrix=$release_matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }} ${{ matrix.mc_game }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        platform: [fabric, neoforge]
        mc_game: ${{ fromJSON(needs.setup.outputs.mc_games) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        shell: bash
        run: |
          set -euo pipefail

          MC_GAME="${{ matrix.mc_game }}"
          MC_TASK="$MC_GAME"

          if [[ "$MC_GAME" =~ ^([0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            base="${BASH_REMATCH[1]}"
            patch="${BASH_REMATCH[2]}"
            if (( patch < 10 )); then patch="0$patch"; fi
            MC_TASK="$base.$patch"
          fi

          mkdir -p out

          if [ "${{ matrix.platform }}" = "fabric" ]; then
            ./gradlew "buildAndCopyFabricJars_${MC_TASK}" -Pfilter_platforms=fabric
            cp fabric/build/libs/*_"$MC_GAME".jar out/
          else
            ./gradlew "buildAndCopyNeoForgeJars_${MC_TASK}" -Pfilter_platforms=neoforge
            cp neoforge/build/libs/*_"$MC_GAME".jar out/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.mc_game }}
          path: out/*.jar
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish (${{ matrix.platform.label }} ${{ matrix.game.mc_game }})
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: inputs.dry_run == false
    strategy:
      fail-fast: true
      matrix:
        platform:
          - { id: fabric, label: Fabric }
          - { id: neoforge, label: NeoForge }
        game: ${{ fromJSON(needs.setup.outputs.release_matrix) }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.platform.id }}-${{ matrix.game.mc_game }}
          path: artifacts

      - name: Publish ${{ matrix.platform.label }} ${{ matrix.game.mc_game }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: H4o5bO7g
          curseforge-id: 1321557
          modrinth-token: ${{ secrets.MODRINTH_PERSONAL_ACCESS_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_PERSONAL_ACCESS_TOKEN }}
          version: ${{ needs.setup.outputs.mod_version }}
          name: EconomyCraft ${{ needs.setup.outputs.mod_version }} - ${{ matrix.platform.label }} - ${{ matrix.game.mc_game }}
          version-type: release
          changelog-file: CHANGELOG.md
          game-versions: |
            ${{ matrix.game.game_versions }}
          dependencies: |
            architectury-api | depends
          files: |
            artifacts/*.jar
