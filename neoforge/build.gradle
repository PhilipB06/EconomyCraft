import org.gradle.api.GradleException

plugins {
    id "com.gradleup.shadow"
}

architectury {
    platformSetupLoomIde()
    neoForge()
}

configurations {
    common { canBeResolved = true; canBeConsumed = false }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentNeoForge.extendsFrom common
    shadowBundle { canBeResolved = true; canBeConsumed = false }
}

repositories {
    gradlePluginPortal()
    maven { url "https://maven.neoforged.net/releases" }
    maven { url "https://maven.architectury.dev/" }
    maven { url "https://maven.offsetmonkey538.top/releases"; name "OffsetMonkey538" }
    mavenCentral()
}

def mcCoord = (rootProject.findProperty("minecraft_version") ?: rootProject.minecraft_version) as String
def tgt     = rootProject.ext.resolveMcTarget(mcCoord)

// The placeholder-api-neoforge library did a major API redesign between the 1.21.11-era release
// (Placeholders.register) and the 26.x-era release (Placeholders.registerServer); only the
// placeholder integration entrypoint lives here, forked per era.
sourceSets {
    main {
        java {
            srcDir "src/${tgt.obfuscated ? 'obfuscated' : 'unobfuscated'}/java"
        }
    }
}

dependencies {
    // Required for Loom
    minecraft "com.mojang:minecraft:${mcCoord}"

    // Platform loader + API
    neoForge "net.neoforged:neoforge:${rootProject.findProperty('neoforge_version') ?: tgt.neoforge}"

    if (tgt.obfuscated) {
        // 1.21.11 is obfuscated; NeoForge itself already uses Mojang's official mappings (it
        // dropped its own obfuscation years ago), but common still needs remapping into them.
        mappings loom.officialMojangMappings()

        modApi "dev.architectury:architectury-neoforge:${rootProject.findProperty('architectury_version_plain') ?: tgt.architecturyVer}"

        // Link common module — namedElements is the remap-aware configuration Loom needs when
        // common was compiled against Mojang official mappings and must be remapped here too.
        common(project(path: ":common", configuration: "namedElements")) { transitive = false }
    } else {
        api "dev.architectury:architectury-neoforge:${rootProject.findProperty('architectury_version_plain') ?: tgt.architecturyVer}"

        // Link common module
        common(project(path: ":common")) { transitive = false }
    }
    shadowBundle project(path: ":common", configuration: "transformProductionNeoForge")

    // placeholder-api-neoforge was never published for the 1.21.x line (only 26.x+), so there's
    // no artifact to compile against on the obfuscated target.
    if (!tgt.obfuscated) {
        compileOnly "eu.pb4:placeholder-api-neoforge:${rootProject.findProperty('placeholder_api_neoforge_version') ?: tgt.placeholderApiNeoForge}"
    }
}

processResources {
    def mcFull = mcCoord.toString()
    def parts = mcFull.tokenize('.')
    if (parts.size() < 2) throw new GradleException("Invalid minecraft_version: ${mcFull}")
    def major = parts[0] as int
    def minor = parts[1] as int
    def mcLo = "${major}.${minor}"
    def mcHi = "${major}.${minor + 1}"

    def nfLo = (rootProject.findProperty("neoforge_line_lo") ?: "26.2").toString()
    def nfHi = (rootProject.findProperty("neoforge_line_hi") ?: "26.3").toString()

    def archVer = (rootProject.findProperty("architectury_version_plain")
            ?: project.findProperty("architectury_version_plain")
            ?: "21.0.2").toString()

    inputs.property "version", project.version
    inputs.property "mcLo", mcLo
    inputs.property "mcHi", mcHi
    inputs.property "nfLo", nfLo
    inputs.property "nfHi", nfHi
    inputs.property "archVer", archVer

    filesMatching("META-INF/neoforge.mods.toml") {
        expand([
                version : project.version,
                mcLo    : mcLo,
                mcHi    : mcHi,
                nfLo    : nfLo,
                nfHi    : nfHi,
                archVer : archVer
        ])
        filteringCharset = 'UTF-8'
    }
}

tasks.withType(Jar).configureEach {
    manifest {
        attributes(
                'Implementation-Title': project.name,
                'Implementation-Version': project.version
        )
    }
}

if (tgt.obfuscated) {
    shadowJar {
        configurations = [project.configurations.shadowBundle]
        archiveClassifier = "dev-shadow"

        manifest {
            attributes(
                    'Implementation-Title': project.name,
                    'Implementation-Version': project.version
            )
        }
    }

    remapJar {
        inputFile.set(shadowJar.archiveFile)
        archiveVersion = ""
    }
} else {
    jar {
        archiveClassifier = "raw"
    }

    shadowJar {
        dependsOn jar
        mainSpec.sourcePaths.clear()
        from(zipTree(jar.archiveFile))

        configurations = [project.configurations.shadowBundle]
        archiveClassifier = null

        manifest {
            attributes(
                    'Implementation-Title': project.name,
                    'Implementation-Version': project.version
            )
        }
    }
}
