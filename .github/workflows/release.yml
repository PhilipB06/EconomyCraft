name: Release to Modrinth & CurseForge

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Mod version"
        required: true
        type: string
      release_track:
        description: "Which Minecraft line to release"
        required: true
        type: choice
        options:
          - "26.x"
          - "1.21.11"
        default: "1.21.11"

jobs:
  setup:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      mc_games: ${{ steps.set.outputs.mc_games }}
    steps:
      - id: set
        shell: bash
        run: |
          if [ "${{ inputs.release_track }}" = "26.x" ]; then
            echo 'mc_games=["26.1.2","26.2"]' >> "$GITHUB_OUTPUT"
          else
            echo 'mc_games=["1.21.11"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.platform }} ${{ matrix.mc_game }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        platform: [fabric, neoforge]
        mc_game: ${{ fromJSON(needs.setup.outputs.mc_games) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        shell: bash
        run: |
          set -euo pipefail

          MC_GAME="${{ matrix.mc_game }}"
          MC_TASK="$MC_GAME"

          if [[ "$MC_GAME" =~ ^([0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            base="${BASH_REMATCH[1]}"
            patch="${BASH_REMATCH[2]}"
            if (( patch < 10 )); then patch="0$patch"; fi
            MC_TASK="$base.$patch"
          fi

          mkdir -p out

          if [ "${{ matrix.platform }}" = "fabric" ]; then
            ./gradlew "buildAndCopyFabricJars_${MC_TASK}" -Pfilter_platforms=fabric
            cp fabric/build/libs/*_"$MC_GAME".jar out/
          else
            ./gradlew "buildAndCopyNeoForgeJars_${MC_TASK}" -Pfilter_platforms=neoforge
            cp neoforge/build/libs/*_"$MC_GAME".jar out/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.mc_game }}
          path: out/*.jar
          if-no-files-found: error

  release-26x:
    name: Release 26.x to Modrinth & CurseForge
    runs-on: ubuntu-latest
    needs: build
    if: inputs.release_track == '26.x'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # -------------------------
      #     NEOFORGE BUILDS
      # -------------------------
      - name: Publish NeoForge 26.1.2
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: H4o5bO7g
          curseforge-id: 1321557
          modrinth-token: ${{ secrets.MODRINTH_PERSONAL_ACCESS_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_PERSONAL_ACCESS_TOKEN }}
          version: ${{ inputs.release_version }}
          name: EconomyCraft ${{ inputs.release_version }} - NeoForge - 26.1.2
          version-type: release
          changelog-file: CHANGELOG.md
          game-versions: |
            [26.1,26.2)
          dependencies: |
            architectury-api | depends
          files: |
            artifacts/neoforge-26.1.2/*.jar

      - name: Publish NeoForge 26.2
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: H4o5bO7g
          curseforge-id: 1321557
          modrinth-token: ${{ secrets.MODRINTH_PERSONAL_ACCESS_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_PERSONAL_ACCESS_TOKEN }}
          version: ${{ inputs.release_version }}
          name: EconomyCraft ${{ inputs.release_version }} - NeoForge - 26.2
          version-type: release
          changelog-file: CHANGELOG.md
          game-versions: |
            [26.2,26.3)
          dependencies: |
            architectury-api | depends
          files: |
            artifacts/neoforge-26.2/*.jar

      # -------------------------
      #     FABRIC BUILDS
      # -------------------------
      - name: Publish Fabric 26.1.2
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: H4o5bO7g
          curseforge-id: 1321557
          modrinth-token: ${{ secrets.MODRINTH_PERSONAL_ACCESS_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_PERSONAL_ACCESS_TOKEN }}
          version: ${{ inputs.release_version }}
          name: EconomyCraft ${{ inputs.release_version }} - Fabric - 26.1.2
          version-type: release
          changelog-file: CHANGELOG.md
          game-versions: |
            [26.1,26.2)
          dependencies: |
            architectury-api | depends
          files: |
            artifacts/fabric-26.1.2/*.jar

      - name: Publish Fabric 26.2
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: H4o5bO7g
          curseforge-id: 1321557
          modrinth-token: ${{ secrets.MODRINTH_PERSONAL_ACCESS_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_PERSONAL_ACCESS_TOKEN }}
          version: ${{ inputs.release_version }}
          name: EconomyCraft ${{ inputs.release_version }} - Fabric - 26.2
          version-type: release
          changelog-file: CHANGELOG.md
          game-versions: |
            [26.2,26.3)
          dependencies: |
            architectury-api | depends
          files: |
            artifacts/fabric-26.2/*.jar

  release-1211:
    name: Release 1.21.11 to Modrinth & CurseForge
    runs-on: ubuntu-latest
    needs: build
    if: inputs.release_track == '1.21.11'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish NeoForge 1.21.11
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: H4o5bO7g
          curseforge-id: 1321557
          modrinth-token: ${{ secrets.MODRINTH_PERSONAL_ACCESS_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_PERSONAL_ACCESS_TOKEN }}
          version: ${{ inputs.release_version }}
          name: EconomyCraft ${{ inputs.release_version }} - NeoForge - 1.21.11
          version-type: release
          changelog-file: CHANGELOG.md
          game-versions: |
            1.21.11
          dependencies: |
            architectury-api | depends
          files: |
            artifacts/neoforge-1.21.11/*.jar

      - name: Publish Fabric 1.21.11
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: H4o5bO7g
          curseforge-id: 1321557
          modrinth-token: ${{ secrets.MODRINTH_PERSONAL_ACCESS_TOKEN }}
          curseforge-token: ${{ secrets.CURSEFORGE_PERSONAL_ACCESS_TOKEN }}
          version: ${{ inputs.release_version }}
          name: EconomyCraft ${{ inputs.release_version }} - Fabric - 1.21.11
          version-type: release
          changelog-file: CHANGELOG.md
          game-versions: |
            1.21.11
          dependencies: |
            architectury-api | depends
          files: |
            artifacts/fabric-1.21.11/*.jar
